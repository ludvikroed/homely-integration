blueprint:
  name: Homely - Notify when a flood sensor detects water
  description: >-
    Run one or more actions when a Homely flood binary sensor changes to the
    detected state.
  domain: automation
  source_url: https://github.com/ludvikroed/homely-integration/blob/main/blueprints/automation/homely/notify_when_flood_is_detected.yaml
  input:
    flood_sensor:
      name: Homely flood sensor
      description: The Homely flood binary sensor to monitor.
      selector:
        entity:
          filter:
            - integration: homely
              domain: binary_sensor
              device_class: moisture
    actions_to_run:
      name: Actions
      description: The actions to run when water is detected.
      default: []
      selector:
        action: {}

mode: single

triggers:
  - trigger: state
    entity_id: !input flood_sensor
    to: "on"

conditions: []

actions: !input actions_to_run
