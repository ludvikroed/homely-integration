name: Question
description: Ask a question about setup, behavior, or how something works.
title: "[Question]: "
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        Use this form for general questions.

        If this is a bug, use **Bug report** instead.
        If this is a setup or login issue, use **Setup or login problem** instead.

  - type: textarea
    id: question
    attributes:
      label: What is your question?
      placeholder: Ask your question here.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Extra context
      placeholder: Add any context that helps explain the question.
    validations:
      required: false

  - type: textarea
    id: versions
    attributes:
      label: Versions
      placeholder: |
        Homely integration version: 1.4.2-beta
        Home Assistant version: 2026.3.4
    validations:
      required: false
