name: Missing device or sensor
description: Report a missing Homely device or missing entities.
body:
  - type: markdown
    attributes:
      value: |
        Please attach diagnostics if you can, and describe what is missing.

  - type: textarea
    id: details
    attributes:
      label: What is missing?
      placeholder: Describe the missing device or entities. Attach diagnostics here if possible.
    validations:
      required: true
