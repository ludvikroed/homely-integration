name: Bug report
description: Report a bug with WebSocket, API/polling, or entity state updates.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please do exactly this before submitting:

        1. Update to the latest version of the integration.
        2. Enable debug logging for `custom_components.homely`.
        3. If possible, reproduce the problem once.
        4. Paste the relevant log lines below. The other fields are helpful, but logs are the most important part.

        If you cannot reproduce the problem again, that is okay. Describe what happened the one time you saw it.

        Use the **Missing device or sensor** form if a device or entity is missing.
        Use the **Setup or login problem** form if you cannot complete setup or sign in.

  - type: textarea
    id: issue_area
    attributes:
      label: What kind of bug is this?
      placeholder: WebSocket or live updates / API or polling / Entity state or attributes / I am not sure
    validations:
      required: false

  - type: textarea
    id: reproduction
    attributes:
      label: Can you reproduce it?
      placeholder: Yes, every time / Sometimes / It happened once / I am not sure
    validations:
      required: false

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Wait ...
        3. Change ...
        4. Observe ...
    validations:
      required: false

  - type: textarea
    id: actual_behavior
    attributes:
      label: What happened?
      placeholder: Describe the actual behavior in one or two sentences, even if it only happened once.
    validations:
      required: false

  - type: textarea
    id: expected_behavior
    attributes:
      label: What did you expect to happen?
      placeholder: Describe the expected behavior in one or two sentences.
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant log lines
      render: shell
      placeholder: Paste log lines here
    validations:
      required: true

  - type: textarea
    id: versions
    attributes:
      label: Versions
      placeholder: |
        Homely integration version: 1.4.2-beta
        Home Assistant version: 2026.3.4
    validations:
      required: false
