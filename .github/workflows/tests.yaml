name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: requirements_test.txt
      - name: Install test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements_test.txt
      - name: Run pytest
        run: pytest

  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: requirements_test.txt
      - name: Install type-check dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements_test.txt
      - name: Run mypy
        run: python -m mypy --config-file mypy.ini -p custom_components.homely

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: requirements_test.txt
      - name: Install lint dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements_test.txt
      - name: Run ruff
        run: python -m ruff check custom_components tests
